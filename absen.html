<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi TKJ - SMK Ma'arif NU Tirto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hidden-section { display: none !important; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full glass-effect rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-center text-white">
            <h1 class="text-2xl font-bold mb-1">Presensi Digital TKJ</h1>
            <p class="text-sm text-blue-100">SMK Ma'arif NU Tirto</p>
        </div>

        <div class="p-6">
            <!-- Loading Cek Perangkat -->
            <div id="loadingState" class="text-center py-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-3"></div>
                <p class="text-gray-600 text-sm">Mengecek status perangkat...</p>
            </div>

            <!-- Bagian 1: Form Registrasi HP (Hanya muncul jika belum terkunci) -->
            <div id="formRegistrasi" class="hidden-section">
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 rounded-r-md">
                    <p class="text-sm text-yellow-800 font-medium">
                        Perhatian: Perangkat ini belum didaftarkan. Satu NISN hanya bisa dikunci pada SATU HP.
                    </p>
                </div>
                
                <form id="regForm" onsubmit="registerDevice(event)">
                    <div class="mb-5">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Masukkan NISN</label>
                        <input type="number" id="regNisn" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="Contoh: 0012345678">
                    </div>
                    <button type="submit" id="btnReg" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center">
                        <span id="btnRegText">Kunci Perangkat Ini</span>
                        <div id="btnRegLoading" class="hidden-section animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                    </button>
                </form>
            </div>

            <!-- Bagian 2: Panel Presensi Utama (Muncul jika HP sudah terkunci) -->
            <div id="panelAbsen" class="hidden-section text-center">
                <div class="mb-6">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-3 text-blue-600">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <h2 id="displayName" class="text-xl font-bold text-gray-800">Nama Siswa</h2>
                    <p id="displayNisn" class="text-gray-500 text-sm">NISN</p>
                </div>

                <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left border border-gray-200">
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-2">Info Perangkat Terkunci</p>
                    <p class="text-sm text-gray-700 break-all" id="displayToken">Token: -</p>
                </div>

                <div class="flex justify-center mt-6 mb-4">
                    <button onclick="catatPresensi()" id="btnAbsen" class="w-36 h-36 bg-gradient-to-tr from-green-500 to-green-400 hover:from-green-600 hover:to-green-500 text-white font-bold rounded-full shadow-[0_10px_20px_rgba(34,197,94,0.4)] hover:shadow-[0_15px_30px_rgba(34,197,94,0.6)] transition-all flex flex-col justify-center items-center transform hover:scale-105 active:scale-95 border-4 border-white">
                        <span id="btnAbsenText" class="flex flex-col items-center">
                            <svg class="w-10 h-10 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            <span class="text-lg tracking-wide">Hadir</span>
                        </span>
                        <div id="btnAbsenLoading" class="hidden-section animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GANTI LINK DI BAWAH INI DENGAN LINK WEB APP GOOGLE APPS SCRIPT ANDA
        const API_URL = "https://script.google.com/macros/s/AKfycbzL7_S5j0H4tB-W_M8KqD-_0gB-LzT-f_a7eGz7nE6nC9pTzR3N4c0z2q8x1w6_5y/exec";

        // Fungsi Generate Token Acak
        function generateToken() {
            return 'DEV-' + Math.random().toString(36).substr(2, 16);
        }

        // Fungsi Pendeteksi Browser Otomatis
        function getNamaBrowser() {
            const ua = navigator.userAgent;
            if (ua.includes("UCBrowser") || ua.includes("UCWEB")) return "UC Browser";
            if (ua.includes("SamsungBrowser")) return "Samsung Internet";
            if (ua.includes("MiuiBrowser")) return "Mi Browser (Xiaomi)";
            if (ua.includes("MintBrowser")) return "Mint Browser (Xiaomi)";
            if (ua.includes("VivoBrowser")) return "Vivo Browser";
            if (ua.includes("OppoBrowser") || ua.includes("HeyTapBrowser")) return "Oppo Browser";
            if (ua.includes("YaBrowser")) return "Yandex Browser";
            if (ua.includes("Vivaldi")) return "Vivaldi";
            if (ua.includes("Maxthon")) return "Maxthon";
            if (ua.includes("Puffin")) return "Puffin Browser";
            if (ua.includes("AlohaBrowser")) return "Aloha Browser";
            if (ua.includes("DuckDuckGo")) return "DuckDuckGo Browser";
            if (ua.includes("FBAN") || ua.includes("FBAV")) return "In-App (Facebook)";
            if (ua.includes("Instagram")) return "In-App (Instagram)";
            if (ua.includes("Edg") || ua.includes("Edge") || ua.includes("EdgiOS")) return "Microsoft Edge";
            if (ua.includes("OPR") || ua.includes("Opera") || ua.includes("OPiOS")) return "Opera";
            if (ua.includes("FxiOS") || ua.includes("Firefox")) return "Mozilla Firefox";
            if (ua.includes("CriOS") || ua.includes("Chrome")) return "Google Chrome";
            if (ua.includes("Safari") && !ua.includes("Chrome") && !ua.includes("Android")) return "Apple Safari";
            return "Browser Bawaan HP / Lainnya";
        }

        // Fungsi Cek Status HP saat web dibuka
        function checkDeviceState() {
            const savedToken = localStorage.getItem('tkj_device_token');
            const savedNisn = localStorage.getItem('tkj_nisn');
            const savedNama = localStorage.getItem('tkj_nama');

            document.getElementById('loadingState').classList.add('hidden-section');

            if (savedToken && savedNisn) {
                document.getElementById('panelAbsen').classList.remove('hidden-section');
                document.getElementById('displayName').innerText = savedNama || "Siswa TKJ";
                document.getElementById('displayNisn').innerText = "NISN: " + savedNisn;
                document.getElementById('displayToken').innerText = "ID Keamanan: " + savedToken.substring(0, 15) + "...";
            } else {
                document.getElementById('formRegistrasi').classList.remove('hidden-section');
            }
        }

        // Rute 1: Fungsi Registrasi Perangkat (Sistem Kunci HP)
        async function registerDevice(e) {
            e.preventDefault();
            const nisn = document.getElementById('regNisn').value;
            const newToken = generateToken();
            const infoBrowser = getNamaBrowser(); 

            document.getElementById('btnRegText').classList.add('hidden-section');
            document.getElementById('btnRegLoading').classList.remove('hidden-section');
            document.getElementById('btnReg').disabled = true;

            const payload = { action: "register_device", nisn: nisn, token: newToken, browser: infoBrowser };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem('tkj_device_token', newToken);
                    localStorage.setItem('tkj_nisn', nisn);
                    localStorage.setItem('tkj_nama', result.nama);
                    
                    Swal.fire('Berhasil!', result.message, 'success').then(() => {
                        checkDeviceState(); 
                    });
                } else {
                    Swal.fire('Registrasi Gagal', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Gagal menghubungi server. Pastikan internet menyala.', 'error');
            } finally {
                document.getElementById('btnRegText').classList.remove('hidden-section');
                document.getElementById('btnRegLoading').classList.add('hidden-section');
                document.getElementById('btnReg').disabled = false;
            }
        }

        // Rute 2: Fungsi Absen & Intelijen GPS Forensik
        function catatPresensi() {
            if (!navigator.geolocation) {
                Swal.fire('Error', 'Browser HP Anda tidak mendukung fitur lokasi.', 'error');
                return;
            }

            document.getElementById('btnAbsenText').classList.add('hidden-section');
            document.getElementById('btnAbsenLoading').classList.remove('hidden-section');
            document.getElementById('btnAbsen').disabled = true;

            // Meminta koordinat dengan akurasi tinggi
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // --- PENANGKAP LOG FORENSIK FAKE GPS ---
                    const akurasi = position.coords.accuracy;
                    let ketinggian = position.coords.altitude;
                    if (ketinggian === null) {
                        ketinggian = "Kosong (Mencurigakan)";
                    } else {
                        ketinggian = ketinggian.toFixed(2) + "m";
                    }
                    const infoForensik = `Akurasi: ${akurasi}m | Ketinggian: ${ketinggian}`;
                    // ---------------------------------------

                    const savedToken = localStorage.getItem('tkj_device_token');
                    const savedNisn = localStorage.getItem('tkj_nisn');
                    const savedNama = localStorage.getItem('tkj_nama');

                    const payload = { 
                        action: "absen", 
                        nisn: savedNisn, 
                        nama: savedNama, 
                        token: savedToken, 
                        latitude: lat, 
                        longitude: lng,
                        log_forensik: infoForensik // Data dikirim ke Code.gs
                    };

                    try {
                        const response = await fetch(API_URL, {
                            method: "POST",
                            body: JSON.stringify(payload),
                            headers: { "Content-Type": "text/plain;charset=utf-8" }
                        });
                        const result = await response.json();

                        if (result.status === "success") {
                            Swal.fire('Hadir!', result.message, 'success');
                        } else {
                            Swal.fire('Gagal Absen', result.message, 'error');
                        }
                    } catch (error) {
                        Swal.fire('Error Jaringan', 'Sinyal tidak stabil, coba lagi.', 'error');
                    } finally {
                        document.getElementById('btnAbsenText').classList.remove('hidden-section');
                        document.getElementById('btnAbsenLoading').classList.add('hidden-section');
                        document.getElementById('btnAbsen').disabled = false;
                    }
                },
                (error) => {
                    let errMsg = 'Tidak bisa melacak lokasi Anda.';
                    if (error.code === 1) errMsg = 'Izin lokasi (GPS) ditolak! Tolong aktifkan di pengaturan HP Anda.';
                    if (error.code === 2) errMsg = 'Sinyal GPS tidak tersedia.';
                    if (error.code === 3) errMsg = 'Pencarian titik lokasi terlalu lama (Timeout).';
                    
                    Swal.fire('GPS Error', errMsg, 'warning');
                    
                    document.getElementById('btnAbsenText').classList.remove('hidden-section');
                    document.getElementById('btnAbsenLoading').classList.add('hidden-section');
                    document.getElementById('btnAbsen').disabled = false;
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        // Jalankan pengecekan saat halaman dimuat
        window.onload = checkDeviceState;
    </script>
</body>
</html>
