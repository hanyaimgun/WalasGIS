<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi Siswa TKJ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-800 min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-teal-500 to-cyan-700">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md relative overflow-hidden">
        
        <a href="index.html" class="absolute top-4 left-4 text-slate-400 hover:text-slate-600">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>

        <div class="text-center mb-6 mt-4">
            <div class="bg-teal-100 text-teal-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fa-solid fa-fingerprint text-3xl"></i>
            </div>
            <h1 class="text-xl font-bold">Presensi Harian</h1>
            <p class="text-slate-500 text-sm">Radius Maksimal: 70 Meter</p>
        </div>

        <div id="sectionRegister" class="hidden-section">
            <div class="bg-amber-50 border border-amber-200 text-amber-700 text-xs p-3 rounded-lg mb-4 text-center">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <b>Perhatian:</b> HP ini akan dikunci secara permanen untuk 1 NISN. Jangan gunakan HP teman!
            </div>
            
            <form id="formRegister" onsubmit="registerDevice(event)">
                <div class="mb-5">
                    <label class="block text-sm font-semibold mb-1">Masukkan NISN Anda</label>
                    <input type="number" id="regNisn" placeholder="Contoh: 001234567" required class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 outline-none focus:border-teal-500 font-mono">
                </div>
                <button type="submit" id="btnReg" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition duration-300 shadow-md">
                    <span id="btnRegText"><i class="fa-solid fa-search mr-1"></i> Cari & Kunci Perangkat</span>
                    <span id="btnRegLoading" class="hidden-section"><div class="spinner"></div> Sinkronisasi Data...</span>
                </button>
            </form>
        </div>

        <div id="sectionAbsen" class="hidden-section text-center">
            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-6">
                <p class="text-xs text-slate-500 mb-1">Login sebagai:</p>
                <h3 id="displayNama" class="font-bold text-teal-700 text-lg leading-tight">Nama Siswa</h3>
                <p id="displayNisn" class="text-sm font-mono text-slate-500 mb-2">123456</p>
                
                <div id="displayStatus" class="hidden-section bg-green-50 border border-green-200 rounded-lg p-2 mt-2">
                    <p class="text-xs font-bold text-green-700"><i class="fa-solid fa-circle-check"></i> Anda telah melakukan Presensi Hari Ini</p>
                    <p id="displayWaktuAbsen" class="text-xs text-green-600 font-semibold mt-1"></p>
                </div>
            </div>

            <button onclick="prosesAbsen()" id="btnAbsen" class="w-40 h-40 bg-teal-500 hover:bg-teal-600 rounded-full text-white font-bold text-2xl shadow-[0_0_20px_rgba(20,184,166,0.5)] transition-all duration-300 active:scale-95 flex flex-col items-center justify-center mx-auto border-4 border-teal-300 relative overflow-hidden group">
                <i id="iconAbsen" class="fa-solid fa-hand-pointer text-4xl mb-2 group-hover:-translate-y-1 transition-transform"></i>
                <span id="btnAbsenText">HADIR</span>
                <div id="btnAbsenLoading" class="hidden-section absolute inset-0 bg-teal-600 flex flex-col items-center justify-center">
                    <div class="spinner mb-2"></div>
                    <span class="text-sm font-normal">Mencari GPS...</span>
                </div>
            </button>
            <p id="teksLokasi" class="text-xs text-slate-400 mt-6"><i class="fa-solid fa-location-dot"></i> Pastikan Anda sudah di dalam area sekolah.</p>
        </div>

    </div>

    <script>
        // API URL Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbyI2ww9Mb9pFwnDl4Ix38U2AIz2gdKBtTJjJmGVJz0Ls9EMu3Ra3q4NHGPKM_8DTq4H/exec";
        
        document.addEventListener("DOMContentLoaded", checkDeviceState);

        function checkDeviceState() {
            const savedToken = localStorage.getItem('tkj_device_token');
            const savedNisn = localStorage.getItem('tkj_nisn');
            const savedNama = localStorage.getItem('tkj_nama');

            if (savedToken && savedNisn && savedNama) {
                document.getElementById('sectionRegister').classList.add('hidden-section');
                document.getElementById('sectionAbsen').classList.remove('hidden-section');
                document.getElementById('displayNama').innerText = savedNama;
                document.getElementById('displayNisn').innerText = savedNisn;

                // --- LOGIKA CEK STATUS ABSEN HARI INI ---
                const lastAbsenRaw = localStorage.getItem('tkj_last_absen_raw'); // Berisi tanggal murni (contoh: Mon Oct 23 2026)
                const lastAbsenText = localStorage.getItem('tkj_last_absen_text'); // Berisi format rapi (contoh: Senin, 23 Oktober 2026, 06:45 WIB)
                const todayRaw = new Date().toDateString();

                const btnAbsen = document.getElementById('btnAbsen');
                const btnAbsenText = document.getElementById('btnAbsenText');
                const iconAbsen = document.getElementById('iconAbsen');
                const displayStatus = document.getElementById('displayStatus');
                const displayWaktuAbsen = document.getElementById('displayWaktuAbsen');
                const teksLokasi = document.getElementById('teksLokasi');

                if (lastAbsenRaw === todayRaw) {
                    // JIKA SUDAH ABSEN HARI INI: Ubah gaya tombol jadi redup dan nonaktifkan
                    btnAbsen.disabled = true;
                    btnAbsen.className = "w-40 h-40 bg-slate-200 rounded-full text-slate-400 font-bold text-2xl flex flex-col items-center justify-center mx-auto border-4 border-slate-100 cursor-not-allowed";
                    btnAbsenText.innerText = "SELESAI";
                    iconAbsen.className = "fa-solid fa-lock text-4xl mb-2";
                    teksLokasi.innerText = "Kembali lagi besok pagi pukul 06:00.";

                    displayWaktuAbsen.innerText = `[${lastAbsenText}]`;
                    displayStatus.classList.remove('hidden-section');
                } else {
                    // JIKA HARI BARU (BELUM ABSEN): Kembalikan tombol jadi hijau
                    btnAbsen.disabled = false;
                    btnAbsen.className = "w-40 h-40 bg-teal-500 hover:bg-teal-600 rounded-full text-white font-bold text-2xl shadow-[0_0_20px_rgba(20,184,166,0.5)] transition-all duration-300 active:scale-95 flex flex-col items-center justify-center mx-auto border-4 border-teal-300 relative overflow-hidden group";
                    btnAbsenText.innerText = "HADIR";
                    iconAbsen.className = "fa-solid fa-hand-pointer text-4xl mb-2 group-hover:-translate-y-1 transition-transform";
                    teksLokasi.innerHTML = `<i class="fa-solid fa-location-dot"></i> Pastikan Anda sudah di dalam area sekolah.`;
                    
                    displayStatus.classList.add('hidden-section');
                }

            } else {
                document.getElementById('sectionRegister').classList.remove('hidden-section');
                document.getElementById('sectionAbsen').classList.add('hidden-section');
            }
        }

        function generateToken() {
            return 'DEV-' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
        }
        // Fungsi baru untuk mendeteksi jenis browser
        // Fungsi cerdas pendeteksi jenis browser (Lebih dari 15 Jenis)
        function getNamaBrowser() {
            const ua = navigator.userAgent;
            
            // 1. Browser Spesifik Merk HP (Tiongkok & Korea)
            if (ua.includes("UCBrowser") || ua.includes("UCWEB")) return "UC Browser";
            if (ua.includes("SamsungBrowser")) return "Samsung Internet";
            if (ua.includes("MiuiBrowser")) return "Mi Browser (Xiaomi)";
            if (ua.includes("MintBrowser")) return "Mint Browser (Xiaomi)";
            if (ua.includes("VivoBrowser")) return "Vivo Browser";
            if (ua.includes("OppoBrowser") || ua.includes("HeyTapBrowser")) return "Oppo Browser";
            
            // 2. Browser Alternatif Populer
            if (ua.includes("YaBrowser")) return "Yandex Browser";
            if (ua.includes("Vivaldi")) return "Vivaldi";
            if (ua.includes("Maxthon")) return "Maxthon";
            if (ua.includes("Puffin")) return "Puffin Browser";
            if (ua.includes("AlohaBrowser")) return "Aloha Browser";
            if (ua.includes("DuckDuckGo")) return "DuckDuckGo Browser";
            
            // 3. In-App Browser (Jika siswa buka link dari sosmed)
            if (ua.includes("FBAN") || ua.includes("FBAV")) return "In-App (Facebook)";
            if (ua.includes("Instagram")) return "In-App (Instagram)";
            
            // 4. Browser Utama (Major Browsers) - Wajib ditaruh di bawah!
            if (ua.includes("Edg") || ua.includes("Edge") || ua.includes("EdgiOS")) return "Microsoft Edge";
            if (ua.includes("OPR") || ua.includes("Opera") || ua.includes("OPiOS")) return "Opera";
            if (ua.includes("FxiOS") || ua.includes("Firefox")) return "Mozilla Firefox";
            
            // Chrome dan Safari di urutan terakhir karena browser lain meniru namanya
            if (ua.includes("CriOS") || ua.includes("Chrome")) return "Google Chrome";
            if (ua.includes("Safari") && !ua.includes("Chrome") && !ua.includes("Android")) return "Apple Safari";
            
            return "Browser Bawaan HP / Lainnya";
        }

        async function registerDevice(e) {
            e.preventDefault();
            const nisn = document.getElementById('regNisn').value;
            const newToken = generateToken();
            const infoBrowser = getNamaBrowser(); // Memanggil fungsi pendeteksi

            document.getElementById('btnRegText').classList.add('hidden-section');
            document.getElementById('btnRegLoading').classList.remove('hidden-section');
            document.getElementById('btnReg').disabled = true;

            // Tambahkan variabel browser ke dalam payload yang dikirim ke server
            const payload = { action: "register_device", nisn: nisn, token: newToken, browser: infoBrowser };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem('tkj_device_token', newToken);
                    localStorage.setItem('tkj_nisn', nisn);
                    localStorage.setItem('tkj_nama', result.nama);
                    
                    Swal.fire('Berhasil!', result.message, 'success').then(() => {
                        checkDeviceState(); 
                    });
                } else {
                    Swal.fire('Registrasi Gagal', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Gagal menghubungi server. Cek internet Anda.', 'error');
            } finally {
                document.getElementById('btnRegText').classList.remove('hidden-section');
                document.getElementById('btnRegLoading').classList.add('hidden-section');
                document.getElementById('btnReg').disabled = false;
            }
        }
       
        function prosesAbsen() {
            const btnText = document.getElementById('btnAbsenText');
            const btnLoading = document.getElementById('btnAbsenLoading');
            const btn = document.getElementById('btnAbsen');

            btnText.classList.add('hidden-section');
            btnLoading.classList.remove('hidden-section');
            btn.disabled = true;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const token = localStorage.getItem('tkj_device_token');
                        const nisn = localStorage.getItem('tkj_nisn');
                        const nama = localStorage.getItem('tkj_nama');

                        const payload = { action: "absen", nisn: nisn, nama: nama, token: token, latitude: lat, longitude: lng };

                        try {
                            const response = await fetch(API_URL, {
                                method: "POST",
                                body: JSON.stringify(payload),
                                headers: { "Content-Type": "text/plain;charset=utf-8" }
                            });
                            const result = await response.json();

                            if (result.status === "success") {
                                // --- SIMPAN REKAMAN WAKTU KE LOKAL BROWSER HP ---
                                const now = new Date();
                                // Opsi untuk menampilkan format: Hari, Tanggal Bulan Tahun
                                const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                                const dateStr = now.toLocaleDateString('id-ID', optionsDate);
                                // Opsi untuk menampilkan jam: Jam:Menit WIB
                                const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                                
                                // Simpan tanggal murni untuk logika mesin
                                localStorage.setItem('tkj_last_absen_raw', now.toDateString()); 
                                // Simpan teks jam cantik untuk dibaca manusia
                                localStorage.setItem('tkj_last_absen_text', `${dateStr}, ${timeStr} WIB`); 

                                Swal.fire('Terekam!', result.message, 'success').then(() => {
                                    checkDeviceState(); // Segarkan tampilan, tombol akan langsung terkunci!
                                });
                            } else {
                                Swal.fire('Gagal Absen', result.message, 'error');
                            }
                        } catch (error) {
                            Swal.fire('Error', 'Koneksi ke server terputus.', 'error');
                        } finally {
                            if(document.getElementById('btnAbsenText').innerText === "HADIR"){
                                // Hanya reset tombol jika belum berstatus "SELESAI"
                                btnText.classList.remove('hidden-section');
                                btnLoading.classList.add('hidden-section');
                                btn.disabled = false;
                            } else {
                                btnLoading.classList.add('hidden-section');
                            }
                        }
                    },
                    function(error) {
                        Swal.fire('GPS Mati', 'Tolong izinkan akses lokasi (GPS) di browser Anda untuk bisa absen.', 'error');
                        btnText.classList.remove('hidden-section');
                        btnLoading.classList.add('hidden-section');
                        btn.disabled = false;
                    },
                    { enableHighAccuracy: true } 
                );
            } else {
                Swal.fire('Error', 'Browser tidak mendukung pencarian lokasi.', 'error');
                btnText.classList.remove('hidden-section');
                btnLoading.classList.add('hidden-section');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
